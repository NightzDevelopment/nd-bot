name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck
        # Strict mode is being rolled out across 128 files (Phase 1 of the
        # overhaul). Until the audit is complete, typecheck is non-blocking.
        # Remove `continue-on-error` once the error count hits 0.
        continue-on-error: true

      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Test
        run: bun test
        # Test suite is being introduced in Phase 7; tolerate no tests for now.
        continue-on-error: true
