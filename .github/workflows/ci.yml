name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        # Blocking: the unit suite must stay green.
        run: bun test
        env:
          # config.ts requires these at import (requiredEnv), so `bun test` throws
          # before any test runs unless they are present. Source them from the
          # repo's Actions secrets when configured, falling back to CI placeholders
          # so the unit suite - which never calls Discord or Google - always loads
          # config and runs.
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN || 'ci-test-token' }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || 'ci-test-key' }}

      - name: Typecheck
        run: bun run typecheck
        # Non-blocking: strict-mode rollout is in progress (~82 errors remain,
        # down from 250). Flip to blocking once the count hits 0.
        continue-on-error: true

      - name: Lint
        run: bun run lint
        # Non-blocking: Biome style cleanup is ongoing. Flip to blocking once clean.
        continue-on-error: true
