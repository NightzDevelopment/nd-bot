<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Audit Log - nd-bot Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .page-body { flex: 1; overflow-y: auto; padding: 28px 28px 48px; }
    .page-wrap  { max-width: 1200px; margin: 0 auto; }
    .page-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .page-title    { font-size: 20px; font-weight: 700; letter-spacing: -0.025em; color: var(--text); margin-bottom: 4px; }
    .page-subtitle { font-size: 13px; color: var(--text-secondary); }
    .page-actions  { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }

    .topnav-right {
      margin-left: auto; display: flex; align-items: center;
      gap: 10px; padding-left: 12px; border-left: 1px solid var(--border);
    }
    .user-pill-text { font-size: 12px; color: var(--text-tertiary); white-space: nowrap; }

    /* Filters */
    .filters {
      display: flex; flex-wrap: wrap; gap: 10px;
      margin-bottom: 16px; align-items: flex-end;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 14px 16px;
    }
    .filter-group  { display: flex; flex-direction: column; gap: 5px; }
    .filter-label  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); }
    .filter-input, .filter-select {
      font: inherit; font-size: 13px; padding: 7px 10px;
      background: var(--bg-input); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius-sm); min-width: 130px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .filter-input:focus, .filter-select:focus { outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--accent-soft); }
    .filter-select option { background: var(--bg-elevated); }
    .filter-actions { display: flex; gap: 6px; align-self: flex-end; }

    /* Table card */
    .table-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-md); }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 11px 16px; text-align: left; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted);
      background: var(--bg-elevated); border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    td { padding: 11px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--text-secondary); }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--bg-hover); }
    td.mono { font-family: var(--font-mono); font-size: 11.5px; }
    td.ts   { white-space: nowrap; color: var(--text-secondary); }

    /* Action badges */
    .action-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .ab-config_changed   { background: rgba(129,140,248,0.15); color: #a5b4fc; border: 1px solid rgba(129,140,248,0.3); }
    .ab-config_restored  { background: rgba(6,182,212,0.12);   color: #22d3ee; border: 1px solid rgba(6,182,212,0.3); }
    .ab-login            { background: rgba(52,211,153,0.12);   color: #4ade80; border: 1px solid rgba(52,211,153,0.3); }
    .ab-user_created     { background: rgba(168,85,247,0.12);   color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }
    .ab-user_deleted     { background: rgba(248,113,113,0.12);  color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
    .ab-user_role_changed{ background: rgba(251,191,36,0.12);   color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .ab-bot_restarted    { background: rgba(248,113,113,0.12);  color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
    .ab-default          { background: var(--bg-elevated);      color: var(--text-tertiary); border: 1px solid var(--border); }

    .detail-link {
      background: none; border: none; color: var(--accent); font-size: 12px;
      cursor: pointer; text-decoration: underline; padding: 0; font-family: inherit;
    }
    .detail-link:hover { color: var(--accent-hover); }

    /* Pagination */
    .pagination {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      justify-content: flex-end; border-top: 1px solid var(--border);
    }
    .page-info { font-size: 13px; color: var(--text-muted); margin-right: auto; }

    /* State */
    .table-state { text-align: center; padding: 60px 24px; color: var(--text-tertiary); font-size: 14px; }
    .table-state-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; display: block; }

    /* Detail modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px); display: flex; align-items: center;
      justify-content: center; z-index: 100; padding: 24px;
    }
    .modal-overlay[hidden] { display: none !important; }
    .modal {
      background: var(--bg-elevated); border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
      width: 100%; max-width: 520px; max-height: 80vh;
      display: flex; flex-direction: column;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .modal-close {
      background: none; border: none; cursor: pointer; color: var(--text-tertiary);
      font-size: 18px; padding: 2px 6px; border-radius: 5px; line-height: 1;
      transition: color 0.1s, background 0.1s;
    }
    .modal-close:hover { color: var(--text); background: var(--bg-hover); }
    .modal-body   { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .modal-footer { display: flex; justify-content: flex-end; padding: 14px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }

    .diff-row { display: flex; flex-direction: column; gap: 4px; }
    .diff-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); }
    .diff-value { font-family: var(--font-mono); font-size: 12.5px; background: var(--bg-card); padding: 7px 10px; border-radius: 6px; word-break: break-all; border: 1px solid var(--border); color: var(--text-secondary); }
    .diff-old   { color: var(--danger);  background: var(--danger-bg);  border-color: rgba(248,113,113,0.2); }
    .diff-new   { color: var(--success); background: var(--success-bg); border-color: rgba(52,211,153,0.2); }
  </style>
</head>
<body>

  <header class="topnav" role="banner">
    <div class="topnav-brand">
      <img class="brand-logo" src="/nightz-logo.png" width="110" height="32" alt="NIGHTZ" decoding="async" />
      <span class="brand-divider"></span>
      <span class="brand-name">nd-bot</span>
    </div>
    <nav class="topnav-pages" aria-label="Dashboard sections">
      <a href="/dashboard" class="navlink">Config</a>
      <a href="/users"     class="navlink">Users</a>
      <a href="/audit"     class="navlink navlink--active" aria-current="page">Audit</a>
      <a href="/settings"  class="navlink">Settings</a>
    </nav>
    <div class="topnav-right">
      <span class="user-pill-text" id="user-pill"></span>
      <button class="btn btn-ghost btn-sm" id="logout-btn">Sign out</button>
    </div>
  </header>

  <div class="page-body" role="main">
    <div class="page-wrap">

      <div class="page-header">
        <div>
          <h1 class="page-title">Audit Log</h1>
          <p class="page-subtitle">All configuration changes, logins, and admin actions</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-ghost btn-sm" id="export-btn">⬇ Export CSV</button>
        </div>
      </div>

      <!-- Filters -->
      <div class="filters">
        <div class="filter-group">
          <span class="filter-label">Action</span>
          <select class="filter-select" id="filter-action">
            <option value="">All actions</option>
            <option value="config_changed">Config changed</option>
            <option value="config_restored">Config restored</option>
            <option value="login">Login</option>
            <option value="user_created">User created</option>
            <option value="user_deleted">User deleted</option>
            <option value="user_role_changed">Role changed</option>
            <option value="bot_restarted">Bot restarted</option>
          </select>
        </div>
        <div class="filter-group">
          <span class="filter-label">Resource / Key</span>
          <input type="text" class="filter-input" id="filter-resource" placeholder="key or user:id…" />
        </div>
        <div class="filter-group">
          <span class="filter-label">From</span>
          <input type="date" class="filter-input" id="filter-from" style="min-width:120px" />
        </div>
        <div class="filter-group">
          <span class="filter-label">To</span>
          <input type="date" class="filter-input" id="filter-to" style="min-width:120px" />
        </div>
        <div class="filter-actions">
          <button class="btn btn-primary btn-sm" id="search-btn">Search</button>
          <button class="btn btn-ghost btn-sm"   id="reset-btn">Reset</button>
        </div>
      </div>

      <!-- Table -->
      <div class="table-card">
        <div id="audit-loading" class="table-state">
          <span class="table-state-icon">⟳</span>Loading audit log…
        </div>
        <div class="table-wrap" id="table-wrap" hidden>
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>User</th>
                <th>Action</th>
                <th>Resource</th>
                <th>IP</th>
                <th>Detail</th>
              </tr>
            </thead>
            <tbody id="audit-body"></tbody>
          </table>
        </div>
        <div id="audit-empty" class="table-state" hidden>
          <span class="table-state-icon">📋</span>No audit entries found.
        </div>
        <div class="pagination" id="pagination" hidden>
          <span class="page-info" id="page-info"></span>
          <button class="btn btn-ghost btn-sm" id="prev-btn">← Prev</button>
          <button class="btn btn-ghost btn-sm" id="next-btn">Next →</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Detail modal -->
  <div class="modal-overlay" id="detail-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="detail-title">
      <div class="modal-header">
        <span class="modal-title" id="detail-title">Audit Entry</span>
        <button class="modal-close" id="detail-close">×</button>
      </div>
      <div class="modal-body" id="detail-body"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="detail-ok">Close</button>
      </div>
    </div>
  </div>

  <script type="module">
  import { api } from '/lib/api-client.js'
  import { showToast } from '/lib/ui-helpers.js'

  const token = sessionStorage.getItem('token')
  if (!token) { window.location.href = '/pages/splash.html'; throw new Error('no token') }

  function decodeJwt(t) {
    try { return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))) } catch { return null }
  }
  const me = decodeJwt(token)
  if (!me) { window.location.href = '/pages/splash.html'; throw new Error('bad token') }

  document.getElementById('user-pill').textContent = `${me.email} (${me.role})`
  document.getElementById('logout-btn').addEventListener('click', () => {
    sessionStorage.clear(); localStorage.clear(); window.location.href = '/pages/splash.html'
  })

  const LIMIT = 50
  let offset = 0, currentFilters = {}

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

  function actionBadge(action) {
    const KNOWN = { config_changed:1, config_restored:1, login:1, user_created:1, user_deleted:1, user_role_changed:1, bot_restarted:1 }
    const cls = KNOWN[action] ? `ab-${action}` : 'ab-default'
    return `<span class="action-badge ${cls}">${action.replace(/_/g,' ')}</span>`
  }

  function formatDate(ts) {
    return new Date(ts).toLocaleString(undefined, { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' })
  }
  function formatRelative(ts) {
    const s = Math.floor((Date.now() - ts) / 1000)
    if (s < 60)    return 'just now'
    if (s < 3600)  return `${Math.floor(s/60)}m ago`
    if (s < 86400) return `${Math.floor(s/3600)}h ago`
    if (s < 604800)return `${Math.floor(s/86400)}d ago`
    return new Date(ts).toLocaleDateString()
  }

  function getFilters() {
    const action   = document.getElementById('filter-action').value
    const resource = document.getElementById('filter-resource').value.trim()
    const fromVal  = document.getElementById('filter-from').value
    const toVal    = document.getElementById('filter-to').value
    return {
      ...(action   ? { action } : {}),
      ...(resource ? { resource } : {}),
      ...(fromVal  ? { from: new Date(fromVal).getTime() } : {}),
      ...(toVal    ? { to: new Date(toVal + 'T23:59:59').getTime() } : {}),
    }
  }

  async function load(newOffset = 0) {
    offset = newOffset
    document.getElementById('audit-loading').hidden = false
    document.getElementById('table-wrap').hidden    = true
    document.getElementById('audit-empty').hidden   = true
    document.getElementById('pagination').hidden    = true

    const res = await api.getAudit({ limit: LIMIT, offset, ...currentFilters })
    document.getElementById('audit-loading').hidden = true

    if (!res.ok) { showToast(res.error || 'Failed to load audit log', 'error'); return }
    const entries = res.data.entries || []

    if (!entries.length) { document.getElementById('audit-empty').hidden = false; return }

    document.getElementById('table-wrap').hidden = false
    document.getElementById('pagination').hidden = false
    document.getElementById('page-info').textContent = `Entries ${offset + 1}-${offset + entries.length}`
    document.getElementById('prev-btn').disabled = offset === 0
    document.getElementById('next-btn').disabled = entries.length < LIMIT

    document.getElementById('audit-body').innerHTML = entries.map(e => `
      <tr>
        <td class="ts" title="${formatDate(e.timestamp)}">${formatRelative(e.timestamp)}</td>
        <td style="color:var(--text)">${escHtml(e.userEmail)}</td>
        <td>${actionBadge(e.action)}</td>
        <td class="mono">${escHtml(e.resource || '-')}</td>
        <td class="mono" style="color:var(--text-muted)">${escHtml(e.ipAddress || '-')}</td>
        <td><button class="detail-link" data-entry='${JSON.stringify(e).replace(/'/g,"&#39;")}'>View</button></td>
      </tr>`).join('')

    document.getElementById('audit-body').querySelectorAll('.detail-link').forEach(btn => {
      btn.addEventListener('click', () => showEntryDetail(JSON.parse(btn.dataset.entry)))
    })
  }

  function showEntryDetail(entry) {
    const { details = {} } = entry
    document.getElementById('detail-title').textContent = `Audit: ${entry.action.replace(/_/g,' ')}`

    let html = `
      <div class="diff-row"><span class="diff-label">Time</span><span class="diff-value">${formatDate(entry.timestamp)}</span></div>
      <div class="diff-row"><span class="diff-label">User</span><span class="diff-value">${escHtml(entry.userEmail)} (${escHtml(entry.userId)})</span></div>
      <div class="diff-row"><span class="diff-label">Action</span><span class="diff-value">${escHtml(entry.action)}</span></div>
      <div class="diff-row"><span class="diff-label">Resource</span><span class="diff-value">${escHtml(entry.resource || '-')}</span></div>
      <div class="diff-row"><span class="diff-label">IP Address</span><span class="diff-value">${escHtml(entry.ipAddress || '-')}</span></div>`

    if (details.oldValue !== undefined)
      html += `<div class="diff-row"><span class="diff-label">Old Value</span><span class="diff-value diff-old">${escHtml(String(details.oldValue))}</span></div>`
    if (details.newValue !== undefined)
      html += `<div class="diff-row"><span class="diff-label">New Value</span><span class="diff-value diff-new">${escHtml(String(details.newValue))}</span></div>`
    if (details.keys)
      html += `<div class="diff-row"><span class="diff-label">Changed Keys</span><span class="diff-value">${Array.isArray(details.keys) ? details.keys.map(escHtml).join(', ') : escHtml(String(details.keys))}</span></div>`

    const remaining = Object.entries(details).filter(([k]) => !['oldValue','newValue','keys','oldValues'].includes(k))
    if (remaining.length)
      html += `<div class="diff-row"><span class="diff-label">Extra</span><span class="diff-value">${escHtml(JSON.stringify(Object.fromEntries(remaining)))}</span></div>`

    document.getElementById('detail-body').innerHTML = html
    document.getElementById('detail-modal').hidden = false
  }

  document.getElementById('search-btn').addEventListener('click', () => { currentFilters = getFilters(); load(0) })
  document.getElementById('reset-btn').addEventListener('click', () => {
    ['filter-action','filter-resource','filter-from','filter-to'].forEach(id => document.getElementById(id).value = '')
    currentFilters = {}; load(0)
  })
  document.getElementById('prev-btn').addEventListener('click', () => load(Math.max(0, offset - LIMIT)))
  document.getElementById('next-btn').addEventListener('click', () => load(offset + LIMIT))
  document.getElementById('detail-close').addEventListener('click', () => document.getElementById('detail-modal').hidden = true)
  document.getElementById('detail-ok').addEventListener('click',    () => document.getElementById('detail-modal').hidden = true)
  document.getElementById('detail-modal').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.hidden = true })
  document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('detail-modal').hidden = true })

  document.getElementById('export-btn').addEventListener('click', () => {
    const params = new URLSearchParams({ format: 'csv', limit: 10000, ...currentFilters })
    fetch(`/api/v2/audit?${params}`, { headers: { authorization: `Bearer ${token}` } })
      .then(r => r.blob())
      .then(blob => {
        const url = URL.createObjectURL(blob)
        const a   = Object.assign(document.createElement('a'), { href: url, download: `audit-${Date.now()}.csv` })
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url)
        showToast('Exported audit log', 'success')
      })
      .catch(() => showToast('Export failed', 'error'))
  })

  load()
  </script>
</body>
</html>
