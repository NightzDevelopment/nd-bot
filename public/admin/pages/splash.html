<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="no-referrer" />
  <meta name="color-scheme" content="dark" />
  <title>Nightz Development - Control Panel</title>
  <link rel="stylesheet" href="/styles/splash.css" />
</head>
<body class="splash-page">
  <div class="splash-container">
    <div class="splash-card">
      <!-- Branding -->
      <div class="splash-header">
        <div class="splash-logo">
          <img src="/nightz-logo.png" alt="Nightz Development" width="56" height="56"
            onerror="this.style.display='none'" />
        </div>
        <h1>Nightz Development</h1>
        <p class="splash-tagline">Bot Control Panel</p>
      </div>

      <!-- Error Message -->
      <div id="errorBanner" class="error-banner" role="alert" style="display: none"></div>

      <!-- Discord-only login -->
      <div id="oauthForm" class="auth-form active">
        <p class="oauth-help">Sign in with Discord. Access is limited to authorized staff.</p>
        <a href="/auth/discord" class="btn btn-discord btn-block">
          <svg width="20" height="20" viewBox="0 0 71 55" fill="currentColor" aria-hidden="true">
            <path d="M60.1 4.9A58.5 58.5 0 0 0 45.6.4a.2.2 0 0 0-.2.1c-.6 1.1-1.3 2.6-1.8 3.7a54 54 0 0 0-16.2 0c-.5-1.2-1.2-2.6-1.9-3.7a.2.2 0 0 0-.2-.1A58.4 58.4 0 0 0 10.6 4.9a.2.2 0 0 0-.1.1C1.3 18.7-1.2 32.1.1 45.4a.2.2 0 0 0 .1.2 58.9 58.9 0 0 0 17.7 9 .2.2 0 0 0 .2-.1c1.4-1.9 2.6-3.9 3.6-6a.2.2 0 0 0-.1-.3c-2-.7-3.8-1.6-5.6-2.6a.2.2 0 0 1 0-.4l1.1-.9a.2.2 0 0 1 .2 0 42 42 0 0 0 35.6 0 .2.2 0 0 1 .2 0l1.1.9a.2.2 0 0 1 0 .4 36.8 36.8 0 0 1-5.6 2.6.2.2 0 0 0-.1.3c1 2.1 2.3 4.1 3.6 6a.2.2 0 0 0 .2.1 58.7 58.7 0 0 0 17.8-9 .2.2 0 0 0 .1-.2c1.5-15.3-2.4-28.6-10.4-40.4a.2.2 0 0 0-.1-.1zM23.7 37.3c-3.5 0-6.4-3.2-6.4-7.1s2.8-7.1 6.4-7.1c3.6 0 6.5 3.2 6.4 7.1 0 3.9-2.8 7.1-6.4 7.1zm23.6 0c-3.5 0-6.4-3.2-6.4-7.1s2.8-7.1 6.4-7.1c3.6 0 6.5 3.2 6.4 7.1 0 3.9-2.8 7.1-6.4 7.1z" />
          </svg>
          Login with Discord
        </a>
      </div>

      <!-- Loading State -->
      <div id="loadingState" class="auth-form" style="display: none">
        <div class="spinner"></div>
        <p>Signing in...</p>
      </div>
    </div>

    <!-- Footer -->
    <footer class="splash-footer">
      <p class="version" id="version">v2.0.0</p>
    </footer>
  </div>

  <script src="/pages/splash.js"></script>
</body>
</html>
