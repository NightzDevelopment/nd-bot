# ND Sentinel dashboard - NGINX reverse proxy
# ---------------------------------------------------------------------------
# Exposes the bot's localhost dashboard (Bun.serve on 127.0.0.1:DASHBOARD_PORT)
# on a public domain with HTTPS + WebSocket support, so you no longer need an
# SSH tunnel. The bot's own login/token auth still applies behind this.
#
# Install:
#   sudo cp deploy/nginx/nd-bot.conf /etc/nginx/sites-available/nd-bot.conf
#   sudo ln -s /etc/nginx/sites-available/nd-bot.conf /etc/nginx/sites-enabled/nd-bot.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Add HTTPS (free, auto-renewing) - certbot rewrites this file to add the 443
# block + an HTTP->HTTPS redirect for you:
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d bot.example.com
#
# IMPORTANT: keep the bot bound to localhost (DASHBOARD_HOST=127.0.0.1, the
# default) so it is reachable ONLY through NGINX, never directly off the internet.
# ---------------------------------------------------------------------------

# WebSocket upgrade plumbing. The dashboard live-activity feed connects to /ws;
# this maps the Upgrade header so proxied WebSockets stay open.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name bot.example.com;          # <-- change to your domain

    # Upload ceiling for dashboard actions (transcripts, imports, etc.).
    client_max_body_size 10m;

    # Don't leak the server version.
    server_tokens off;

    location / {
        proxy_pass http://127.0.0.1:3853;  # <-- must match DASHBOARD_PORT in .env
        proxy_http_version 1.1;

        # Real client info (the app reads X-Forwarded-For for IP / rate limiting).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (covers /ws and any future WS endpoints).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Keep the live feed's WebSocket alive instead of timing it out.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ---- Optional extra hardening (defense in depth, app already authenticates) ----
    # Restrict to your IP(s):
    #   allow 203.0.113.4;  deny all;
    # Or an extra NGINX basic-auth gate:
    #   auth_basic "ND Sentinel";  auth_basic_user_file /etc/nginx/.htpasswd;
    #   (create with: sudo apt-get install -y apache2-utils && sudo htpasswd -c /etc/nginx/.htpasswd admin)
}
